version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: shipguard_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shipguard_db
      MYSQL_USER: shipguard
      MYSQL_PASSWORD: shipguard123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "shipguard", "-pshipguard123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s   # give MySQL time to init before counting failures

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shipguard_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://shipguard:shipguard123@mysql:3306/shipguard_db
      MOCK_NOTIFICATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile        # npm install runs at BUILD time, not every startup
    container_name: shipguard_frontend
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src     # hot-reload src on; node_modules stays in image
    depends_on:
      - backend

volumes:
  mysql_data:
